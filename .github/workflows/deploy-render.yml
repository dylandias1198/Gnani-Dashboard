name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify app imports
        run: python -c "from dashboard import app, server; assert server is not None"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not set. Skipping deploy."
            echo "Add it in GitHub: Settings → Secrets and variables → Actions"
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deploy triggered."
