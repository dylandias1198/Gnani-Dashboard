services:
  - type: web
    name: gnani-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && (command -v kaleido_get_chrome >/dev/null && kaleido_get_chrome || true)
    startCommand: gunicorn dashboard:server --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

  # Cron: default 12:00 IST (06:30 UTC). Change schedule to match CRON_SCHEDULE / your time.
  - type: cron
    name: gnani-scheduled-report
    runtime: python
    schedule: "30 6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scheduled_job.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: INBOX_PROVIDER
        value: graph
      - key: EMAIL_PROVIDER
        value: graph
      - key: INBOX_TODAY_ONLY
        value: "true"
      - key: MAILBOX_TIMEZONE
        value: Asia/Kolkata
